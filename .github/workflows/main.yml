name: Build Salman Downloader APK

# Yeh workflow har baar chalega jab aap "main" branch par code push karein,
# ya phir aap ise Actions tab se manually bhi chala sakte hain.
on:
  push:
    branches: [ "main" ]
  workflow_dispatch: {}

jobs:
  build-apk:
    runs-on: ubuntu-22.04
    steps:
      - name: Repo checkout karein
        uses: actions/checkout@v4

      - name: Java 17 setup karein
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Python setup karein
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: System dependencies install karein
        run: |
          sudo apt-get update
          sudo apt-get install -y git zip unzip autoconf libtool \
            pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev \
            libtinfo6 cmake libffi-dev libssl-dev build-essential

      - name: Buildozer aur Cython install karein
        run: |
          pip install --upgrade pip
          pip install buildozer==1.5.0 cython==0.29.33 virtualenv

      - name: Buildozer cache set karein (agli builds tez ho jayengi)
        uses: actions/cache@v4
        with:
          path: |
            .buildozer
            ~/.buildozer
          key: buildozer-${{ hashFiles('buildozer.spec') }}

      - name: Android SDK download aur license accept karein (agar pehle se nahi hai)
        run: |
          SDK_DIR="$HOME/.buildozer/android/platform/android-sdk"
          if [ ! -f "$SDK_DIR/cmdline-tools/latest/bin/sdkmanager" ]; then
            mkdir -p "$SDK_DIR/cmdline-tools"
            cd "$SDK_DIR/cmdline-tools"
            curl -o cmdline-tools.zip https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
            unzip -q cmdline-tools.zip
            mv cmdline-tools latest
            rm cmdline-tools.zip
          fi
          # Buildozer's older versions only look for the legacy "tools/bin/sdkmanager"
          # path, so we duplicate the install there as a real copy (not a symlink,
          # so the script's relative-path lookups keep working correctly).
          if [ ! -f "$SDK_DIR/tools/bin/sdkmanager" ]; then
            cp -r "$SDK_DIR/cmdline-tools/latest" "$SDK_DIR/tools"
          fi
          yes | "$SDK_DIR/cmdline-tools/latest/bin/sdkmanager" --sdk_root="$SDK_DIR" --licenses
          "$SDK_DIR/cmdline-tools/latest/bin/sdkmanager" --sdk_root="$SDK_DIR" "platform-tools" "platforms;android-33" "build-tools;33.0.2"
          yes | "$SDK_DIR/tools/bin/sdkmanager" --sdk_root="$SDK_DIR" --licenses || true

      - name: APK build karein
        run: |
          yes | buildozer -v android debug

      - name: APK ko artifact ke tor par upload karein
        uses: actions/upload-artifact@v4
        with:
          name: salman-downloader-apk
          path: bin/*.apk
