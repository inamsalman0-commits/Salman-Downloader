name: Build Salman Downloader APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: {}

jobs:
  build-apk:
    runs-on: ubuntu-22.04

    steps:
      - name: Repo checkout karein
        uses: actions/checkout@v4

      - name: System dependencies install karein
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            git \
            ffmpeg \
            libsdl2-dev \
            libsdl2-image-dev \
            libsdl2-mixer-dev \
            libsdl2-ttf-dev \
            libportmidi-dev \
            libswscale-dev \
            libavformat-dev \
            libavcodec-dev \
            zlib1g-dev \
            libgstreamer1.0-dev \
            gstreamer1.0-plugins-base \
            gstreamer1.0-plugins-good \
            gstreamer1.0-plugins-bad \
            gstreamer1.0-plugins-ugly \
            gstreamer1.0-libav \
            libsqlite3-dev \
            sqlite3 \
            bzip2 \
            libbz2-dev \
            libssl-dev \
            openssl \
            libgdbm-dev \
            libgdbm-compat-dev \
            liblzma-dev \
            libreadline-gplv2-dev \
            libncursesw5-dev \
            libffi-dev \
            uuid-dev \
            tar \
            unzip \
            zip \
            openjdk-17-jdk

      - name: Python set up karein
        uses: actions/setup-python@v5
        with:
          python-python-version: '3.10'

      - name: Buildozer install karein
        run: |
          pip install --upgrade pip
          pip install Cython==0.29.36 buildozer virtualenv

      - name: Buildozer cache set karein (agli builds tez ho jayengi)
        uses: actions/cache@v4
        with:
          path: .buildozer
          key: buildozer-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            buildozer-${{ runner.os }}-

      - name: APK build karein
        run: |
          # Android SDK license accept karne ke liye
          yes | buildozer android debug

      - name: APK ko artifact ke tor par upload karein
        uses: actions/upload-artifact@v4
        with:
          name: salman-downloader-apk
          path: bin/*.apk
